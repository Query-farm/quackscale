# Two-node QuackTail e2e over Headscale. Manual only — uses pre-built release binaries.
name: Headscale QuackTail e2e

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag (leave empty for latest)'
        required: false
        default: latest
        type: string

permissions:
  contents: read

jobs:
  quacktail-e2e:
    name: Headscale QuackTail e2e (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Download QuackTail release binary
        env:
          QUACKTAIL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          chmod +x scripts/ci_download_release_duckdb.sh
          eval "$(./scripts/ci_download_release_duckdb.sh "${{ inputs.release_tag }}")"
          echo "DUCKDB=$DUCKDB" >> "$GITHUB_ENV"
          "$DUCKDB" -version || "$DUCKDB" --version

      - name: Run Headscale QuackTail e2e
        run: |
          chmod +x scripts/ci_headscale_e2e.sh scripts/lib/headscale_ci.sh
          ./scripts/ci_headscale_e2e.sh
