# Fast PR check: build examples images and verify quackscale functions (no full e2e).
name: Docker compose build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/docker-compose-build.yml'
      - 'examples/Dockerfile'
      - 'examples/docker-compose.yml'
      - 'scripts/e2e/docker-build-quackscale.sh'
      - 'scripts/e2e/quacktail-verify-image.sh'
      - '.dockerignore'
      - 'src/**'
      - 'cmake/**'

env:
  COMPOSE_PROJECT_NAME: quacktail-ci-build

jobs:
  compose-build:
    name: docker compose build + verify
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and verify quacktail-server image
        working-directory: examples
        run: |
          docker compose build quacktail-server quacktail-client
          docker compose run --rm --entrypoint /usr/local/bin/quacktail-verify-image.sh quacktail-server

      - name: Teardown
        if: always()
        working-directory: examples
        run: docker compose down --remove-orphans || true
